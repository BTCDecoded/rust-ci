name: Strip patch.crates-io for crates.io CI
description: >-
  Remove [patch.crates-io] blocks from Cargo.toml and .cargo/config.toml so CI
  resolves crates from crates.io (no monorepo sibling paths).

inputs:
  working-directory:
    description: Directory to search (relative to the workspace root).
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Strip [patch.crates-io]
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bash "${{ github.action_path }}/strip-patch-crates-io.sh"

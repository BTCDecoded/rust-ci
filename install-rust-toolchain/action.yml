name: Install Rust toolchain (pinned)
description: >-
  Thin wrapper around dtolnay/rust-toolchain for the org default pinned toolchain.

inputs:
  toolchain:
    description: Rust toolchain version (e.g. 1.88.0). Ignored when toolchain-file is set.
    required: false
    default: "1.88.0"
  toolchain-file:
    description: Path to rust-toolchain.toml (or rust-toolchain). When set, dtolnay reads the channel from this file.
    required: false
    default: ""
  components:
    description: >-
      Extra rustup components. When toolchain-file is set, passed to dtolnay (comma-separated, e.g. rustfmt, clippy).
      Otherwise space-separated for rustup component add after pinned toolchain install.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust (from rust-toolchain.toml, with components)
      if: ${{ inputs.toolchain-file != '' && inputs.components != '' }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain-file: ${{ inputs.toolchain-file }}
        components: ${{ inputs.components }}

    - name: Install Rust (from rust-toolchain.toml)
      if: ${{ inputs.toolchain-file != '' && inputs.components == '' }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain-file: ${{ inputs.toolchain-file }}

    - name: Install Rust (pinned version)
      if: ${{ inputs.toolchain-file == '' }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}

    - name: Add rustup components
      if: ${{ inputs.toolchain-file == '' && inputs.components != '' }}
      shell: bash
      run: rustup component add ${{ inputs.components }} --toolchain "${{ inputs.toolchain }}"

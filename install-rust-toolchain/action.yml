name: Install Rust toolchain (pinned)
description: >-
  Thin wrapper around dtolnay/rust-toolchain for the org default pinned toolchain.

inputs:
  toolchain:
    description: Rust toolchain version (e.g. 1.88.0). Ignored when toolchain-file is set.
    required: false
    default: "1.88.0"
  toolchain-file:
    description: Path to rust-toolchain.toml (or rust-toolchain). When set, dtolnay reads the channel from this file.
    required: false
    default: ""
  components:
    description: >-
      Extra rustup components. When toolchain-file is set, passed to dtolnay (comma-separated, e.g. rustfmt, clippy).
      Otherwise space-separated for rustup component add after pinned toolchain install.
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Apply to every subsequent step (including dtolnay's rustc invocations). dtolnay only sets
    # RUSTUP_PERMIT_COPY_RENAME on the rustup toolchain install step; without a global setting,
    # concurrent jobs on a shared self-hosted runner can hit ETXTBSY ("Text file busy") on the
    # ~/.cargo/bin/rustc proxy while rustup replaces it. RUSTUP_NO_SELF_UPDATE avoids rustup
    # mutating its own install mid-job (see rust-lang/rustup#2415 and related CI flakes).
    - name: Rustup environment (mitigate rustc ETXTBSY on shared runners)
      shell: bash
      run: |
        {
          echo 'RUSTUP_PERMIT_COPY_RENAME=1'
          echo 'RUSTUP_NO_SELF_UPDATE=1'
        } >> "$GITHUB_ENV"

    - name: Install Rust (from rust-toolchain.toml, with components)
      if: ${{ inputs.toolchain-file != '' && inputs.components != '' }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain-file: ${{ inputs.toolchain-file }}
        components: ${{ inputs.components }}

    - name: Install Rust (from rust-toolchain.toml)
      if: ${{ inputs.toolchain-file != '' && inputs.components == '' }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain-file: ${{ inputs.toolchain-file }}

    - name: Install Rust (pinned version)
      if: ${{ inputs.toolchain-file == '' }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}

    - name: Add rustup components
      if: ${{ inputs.toolchain-file == '' && inputs.components != '' }}
      shell: bash
      run: rustup component add ${{ inputs.components }} --toolchain "${{ inputs.toolchain }}"

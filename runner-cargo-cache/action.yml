name: Runner Cargo cache (self-hosted)
description: >-
  Bind CARGO_CACHE_DIR / TARGET_CACHE_DIR from a cache key, restore from the
  shared runner cache, save back after builds, or prune old cache dirs.

inputs:
  operation:
    description: bind-env | restore | save | prune
    required: true
  cache-key:
    description: Cache key segment (required for bind-env).
    required: false
    default: ""
  cache-root:
    description: Root directory for cargo/target cache trees.
    required: false
    default: /tmp/runner-cache
  include-target:
    description: For bind-env, whether to set TARGET_CACHE_DIR.
    required: false
    default: "true"
  save-target-only:
    description: For save, only rsync ./target to TARGET_CACHE_DIR (no registry/git).
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Cargo cache
      shell: bash
      env:
        CACHE_KEY: ${{ inputs.cache-key }}
        CACHE_ROOT: ${{ inputs.cache-root }}
        INCLUDE_TARGET: ${{ inputs.include-target }}
        SAVE_TARGET_ONLY: ${{ inputs.save-target-only }}
      run: bash "${{ github.action_path }}/cargo-cache.sh" "${{ inputs.operation }}"
